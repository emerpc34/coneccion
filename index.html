<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DAKO-BOT — Puente de Login Deriv</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="card">
    <h1>🔗 DAKO-BOT</h1>
    <div class="sub">Puente de inicio de sesión con Deriv</div>

    <div id="statusBox" class="status wait">
      Pulsa el botón para iniciar sesión en Deriv y conectar tu bot.
    </div>

    <button id="loginBtn" class="btn">🌐 Iniciar sesión con Deriv</button>

    <div class="hint">
      Esta página no guarda tus credenciales. Solo gestiona el inicio de
      sesión oficial de Deriv y te entrega el resultado para que tu bot
      DAKO-BOT, que corre en tu computadora, lo reciba.
    </div>
  </div>

<script type="module" src="/main.js"></script>
</body>
</html>
